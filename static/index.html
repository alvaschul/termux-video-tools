<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Termux Video Tools</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            color: #666;
            font-size: 1.1em;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        input[type="text"],
        input[type="file"],
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="file"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            margin-top: 10px;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .detector {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 6px;
            margin-top: 15px;
        }

        .detector-result {
            margin-top: 10px;
            padding: 10px;
            background: white;
            border-left: 4px solid #667eea;
            border-radius: 4px;
        }

        .detector-result.loading {
            border-left-color: #ffc107;
        }

        .detector-result.error {
            border-left-color: #dc3545;
            color: #dc3545;
        }

        .detector-result.success {
            border-left-color: #28a745;
        }

        .jobs-section {
            margin-top: 30px;
        }

        .job-item {
            background: #f8f9fa;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 6px;
            border-left: 4px solid #667eea;
        }

        .job-item.done {
            border-left-color: #28a745;
            background: #f0fdf4;
        }

        .job-item.error {
            border-left-color: #dc3545;
            background: #fef2f2;
        }

        .job-item.running {
            border-left-color: #ffc107;
            background: #fffbf0;
        }

        .job-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .job-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .status-queued {
            background: #e3f2fd;
            color: #1976d2;
        }

        .status-running {
            background: #fff3e0;
            color: #f57c00;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .status-done {
            background: #e8f5e9;
            color: #388e3c;
        }

        .status-error {
            background: #ffebee;
            color: #c62828;
        }

        .job-url {
            color: #667eea;
            word-break: break-all;
            font-size: 0.9em;
            margin: 5px 0;
        }

        .job-message {
            color: #666;
            font-size: 0.9em;
            margin-top: 8px;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .extractors-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .extractor-item {
            background: #f8f9fa;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 6px;
            border-left: 3px solid #667eea;
            font-size: 0.9em;
        }

        .extractor-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .extractor-domains {
            color: #666;
            font-size: 0.85em;
            word-break: break-word;
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            background: #667eea;
            color: white;
            border-radius: 3px;
            font-size: 0.75em;
            margin-right: 5px;
            margin-top: 5px;
        }

        .badge-auth {
            background: #ff9800;
        }

        .badge-playlist {
            background: #2196f3;
        }

        .badge-live {
            background: #f44336;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.8em;
            font-weight: bold;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .refresh-btn {
            background: #f0f0f0;
            color: #333;
            padding: 10px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }

        .refresh-btn:hover {
            background: #e0e0e0;
        }

        .loading {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state svg {
            width: 60px;
            height: 60px;
            margin-bottom: 20px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎬 Termux Video Tools</h1>
            <p class="subtitle">Download videos from 1000+ websites with automatic site detection</p>
        </header>

        <div class="main-grid">
            <div>
                <div class="card">
                    <h2>📥 Download Video</h2>
                    
                    <form id="downloadForm">
                        <div class="form-group">
                            <label for="url">Video URL:</label>
                            <input type="text" id="url" name="url" placeholder="https://youtube.com/watch?v=..." required>
                            <div class="detector">
                                <button type="button" class="refresh-btn" onclick="detectExtractor()">
                                    Detect Site
                                </button>
                                <div id="detectorResult"></div>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="format">Format:</label>
                            <select id="format" name="format">
                                <option value="best">Best Quality</option>
                                <option value="bestvideo+bestaudio/best">Best Video + Audio</option>
                                <option value="bestaudio">Audio Only</option>
                                <option value="worst">Lowest Quality</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="cookies">Cookies File (for authentication):</label>
                            <input type="file" id="cookies" name="cookies" accept=".txt">
                            <small style="color: #999; display: block; margin-top: 5px;">
                                Export from browser as cookies.txt for Instagram, private videos, etc.
                            </small>
                        </div>

                        <div class="form-group">
                            <div class="checkbox-group">
                                <input type="checkbox" id="useAria2" name="useAria2">
                                <label for="useAria2" style="margin: 0;">Use aria2 acceleration</label>
                            </div>
                            <small style="color: #999; display: block; margin-top: 5px;">
                                Requires aria2c running (faster segmented downloads)
                            </small>
                        </div>

                        <button type="submit">Download</button>
                    </form>
                </div>

                <div class="card jobs-section">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h2 style="margin: 0; border: none; padding: 0;">📋 Download Queue</h2>
                        <button class="refresh-btn" onclick="loadJobs()" style="width: auto; padding: 8px 16px;">
                            Refresh
                        </button>
                    </div>
                    <div id="jobsList"></div>
                </div>
            </div>

            <div class="sidebar">
                <div class="card">
                    <h2 style="font-size: 1.2em;">🌐 Supported Sites</h2>
                    <div id="extractorsStats" class="stats"></div>
                    <div class="extractors-list" id="extractorsList"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
    <script>
        const API_BASE = '/api';

        // Initialize
        loadExtractors();
        loadJobs();
        setInterval(loadJobs, 2000); // Refresh jobs every 2 seconds

        async function detectExtractor() {
            const url = document.getElementById('url').value;
            if (!url) {
                alert('Please enter a URL');
                return;
            }

            const resultDiv = document.getElementById('detectorResult');
            resultDiv.innerHTML = '<div class="detector-result loading">Detecting... <span class="loading"></span></div>';

            try {
                const response = await fetch(`${API_BASE}/detect`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });

                if (!response.ok) {
                    throw new Error('No suitable extractor found');
                }

                const data = await response.json();
                let html = `<div class="detector-result success">
                    <strong>✓ ${data.extractor}</strong><br>
                    ${data.description}<br>
                    <small>Default format: <code>${data.default_format}</code></small>`;
                
                if (data.requires_auth) {
                    html += '<br><small style="color: #ff9800;">⚠️ Requires authentication (cookies)</small>';
                }
                if (data.supports_playlists) {
                    html += '<br><small>✓ Supports playlists</small>';
                }
                if (data.supports_live) {
                    html += '<br><small>✓ Supports live streams</small>';
                }
                html += '</div>';
                
                document.getElementById('format').value = data.default_format;
                resultDiv.innerHTML = html;
            } catch (error) {
                resultDiv.innerHTML = `<div class="detector-result error">✗ ${error.message}</div>`;
            }
        }

        async function downloadVideo() {
            const formData = new FormData();
            formData.append('url', document.getElementById('url').value);
            formData.append('format', document.getElementById('format').value);
            formData.append('use_aria2', document.getElementById('useAria2').checked ? 'true' : 'false');
            
            const cookiesFile = document.getElementById('cookies').files[0];
            if (cookiesFile) {
                formData.append('cookies_file', cookiesFile);
            }

            try {
                const response = await fetch(`${API_BASE}/download`, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error('Download request failed');
                }

                const data = await response.json();
                alert(`Download queued! Job ID: ${data.job_id}`);
                document.getElementById('downloadForm').reset();
                document.getElementById('detectorResult').innerHTML = '';
                loadJobs();
            } catch (error) {
                alert(`Error: ${error.message}`);
            }
        }

        async function loadExtractors() {
            try {
                const response = await fetch(`${API_BASE}/extractors`);
                const data = await response.json();

                // Stats
                const statsHtml = `
                    <div class="stat-box">
                        <div class="stat-value">${data.total_extractors}</div>
                        <div class="stat-label">Extractors</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value">${data.total_domains}</div>
                        <div class="stat-label">Sites</div>
                    </div>
                `;
                document.getElementById('extractorsStats').innerHTML = statsHtml;

                // List
                let listHtml = '';
                for (const [key, info] of Object.entries(data.extractors)) {
                    let badges = '';
                    if (info.requires_auth) badges += '<span class="badge badge-auth">Auth</span>';
                    if (info.supports_playlists) badges += '<span class="badge badge-playlist">Playlist</span>';
                    if (info.supports_live) badges += '<span class="badge badge-live">Live</span>';

                    listHtml += `
                        <div class="extractor-item">
                            <div class="extractor-name">${info.name}</div>
                            ${badges}
                            <div class="extractor-domains">${info.domains.join(', ') || 'Fallback for any site'}</div>
                        </div>
                    `;
                }
                document.getElementById('extractorsList').innerHTML = listHtml;
            } catch (error) {
                console.error('Failed to load extractors:', error);
            }
        }

        async function loadJobs() {
            try {
                const response = await fetch(`${API_BASE}/jobs`);
                const jobs = await response.json();

                let jobsHtml = '';
                const jobsArray = Object.values(jobs).reverse();

                if (jobsArray.length === 0) {
                    jobsHtml = '<div class="empty-state">No downloads yet. Add one above! ⬆️</div>';
                } else {
                    for (const job of jobsArray) {
                        const statusClass = `status-${job.status}`;
                        jobsHtml += `
                            <div class="job-item ${job.status}">
                                <div class="job-header">
                                    <span class="job-status ${statusClass}">${job.status.toUpperCase()}</span>
                                    <small style="color: #999;">${job.extractor}</small>
                                </div>
                                <div class="job-url">${truncateUrl(job.url, 60)}</div>
                                ${job.message ? `<div class="job-message">📝 ${job.message}</div>` : ''}
                                ${job.status === 'error' ? `
                                    <button class="btn-secondary" onclick="retryJob('${job.id}')" style="font-size: 0.9em; padding: 8px;">
                                        Retry
                                    </button>
                                ` : ''}
                            </div>
                        `;
                    }
                }

                document.getElementById('jobsList').innerHTML = jobsHtml;
            } catch (error) {
                console.error('Failed to load jobs:', error);
            }
        }

        async function retryJob(jobId) {
            try {
                const response = await fetch(`${API_BASE}/retry/${jobId}`, {
                    method: 'POST'
                });
                const data = await response.json();
                alert(`Retrying... New Job ID: ${data.new_job_id}`);
                loadJobs();
            } catch (error) {
                alert(`Error: ${error.message}`);
            }
        }

        function truncateUrl(url, length) {
            return url.length > length ? url.substring(0, length) + '...' : url;
        }
    </script>
</body>
</html>
